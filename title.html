<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLORS BOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #16161a;
    --line: #e0e0e4;
    --text-primary: #e8e6e0;
    --text-muted: #55545e;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
  }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 50% 0%, #202027 0%, #16161a 60%);
    color: var(--text-primary);
    overflow: hidden;
  }
  .section {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #titleSection { flex: 0.7; align-items: flex-end; padding-bottom: 8px; }
  #boxSection { flex: 1.3; }
  #startSection { flex: 1; }
  #titleSection svg { width: 90%; max-width: 420px; height: auto; }
  #boxSection svg { width: 45%; max-width: 220px; height: auto; }
  #startSection button {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 40px;
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.18em;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  #startSection button:hover {
    background: #26262e;
  }
  #blackout {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.8s ease;
  }
  #blackout.active { opacity: 1; }
  #pageWrap {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    transform-origin: 50% 42%;
  }
  #pageWrap.zooming {
    animation: zoomIntoBox 1.1s cubic-bezier(0.6, 0, 0.85, 1) forwards;
  }
  @keyframes zoomIntoBox {
    0% { transform: scale(1); }
    100% { transform: scale(6); }
  }
</style>
</head>
<body>

<div id="pageWrap">
<div class="section" id="titleSection">
  <svg id="titleGlyph" viewBox="0 0 620 90"></svg>
</div>

<div class="section" id="boxSection">
  <svg id="boxSvg" viewBox="0 0 240 200" fill="none">
    <g transform="translate(18, 0)">
    <!-- Box body (closed): front face, right face, top rim -->
    <polygon points="30,90 130,90 130,170 30,170" fill="#e8e6e0" fill-opacity="0.9" stroke="#e8e6e0" stroke-width="5" stroke-linejoin="round"/>
    <polygon points="130,90 165,70 165,150 130,170" fill="#e8e6e0" fill-opacity="0.7" stroke="#e8e6e0" stroke-width="5" stroke-linejoin="round"/>
    <polygon points="30,90 65,70 165,70 130,90" fill="#e8e6e0" fill-opacity="0.55" stroke="#e8e6e0" stroke-width="5" stroke-linejoin="round"/>

    <!-- Lid (closed, sitting flush on top), grouped separately for animation -->
    <g id="lidGroup" style="transform-origin: 65px 70px; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);">
      <polygon points="22,88 62,64 168,64 132,88" fill="#e8e6e0" fill-opacity="0.95" stroke="#e8e6e0" stroke-width="5" stroke-linejoin="round"/>
      <polygon points="22,88 132,88 132,96 22,96" fill="#e8e6e0" fill-opacity="0.75" stroke="#e8e6e0" stroke-width="5" stroke-linejoin="round"/>
    </g>
    </g>
  </svg>
</div>

<div class="section" id="startSection">
  <button id="startBtn">START</button>
</div>
</div>

<div id="blackout"></div>

<script>
const strokeW = 8;

function line(x1,y1,x2,y2) {
  return { x1, y1, x2, y2 };
}

const glyphs = {};
glyphs['C'] = [ line(45,10,10,10), line(10,10,10,80), line(10,80,45,80) ];
glyphs['O'] = [ line(10,10,45,10), line(10,10,10,80), line(45,10,45,80), line(10,80,45,80) ];
glyphs['L'] = [ line(10,10,10,80), line(10,80,45,80) ];
glyphs['R'] = [ line(10,10,10,80), line(10,10,45,10), line(45,10,45,45), line(10,45,45,45), line(10,45,45,80) ];
glyphs['S'] = [ line(45,10,10,10), line(10,10,10,45), line(10,45,45,45), line(45,45,45,80), line(10,80,45,80) ];
glyphs['B'] = [ line(10,10,10,80), line(10,10,35,10), line(35,10,35,40), line(10,40,35,40), line(10,80,45,80), line(45,80,45,40), line(35,40,45,40) ];
glyphs['X'] = [ line(10,10,45,80), line(45,10,10,80) ];

function glyphSVG(ch, offsetX, scale) {
  const strokes = glyphs[ch];
  if (!strokes) return "";
  let out = "";
  strokes.forEach(({x1,y1,x2,y2}) => {
    out += `<line x1="${(x1*scale)+offsetX}" y1="${y1*scale}" x2="${(x2*scale)+offsetX}" y2="${y2*scale}" stroke="#e8e6e0" stroke-width="${strokeW}" stroke-linecap="round"/>`;
  });
  return out;
}

function renderTitle(text) {
  const scale = 0.62;
  const letterW = 46 * scale;
  const gap = 20 * scale;
  const spaceW = 30 * scale;
  let x = 0;
  for (const ch of text) {
    if (ch === ' ') { x += spaceW; continue; }
    x += letterW + gap;
  }
  const totalW = x - gap;
  const startX = (620 - totalW) / 2;
  let centered = "";
  x = 0;
  for (const ch of text) {
    if (ch === ' ') { x += spaceW; continue; }
    centered += glyphSVG(ch, x + startX, scale);
    x += letterW + gap;
  }
  document.getElementById('titleGlyph').innerHTML = centered;
}

renderTitle("COLORS BOX");

document.getElementById('startBtn').addEventListener('click', () => {
  const startBtn = document.getElementById('startBtn');
  const lidGroup = document.getElementById('lidGroup');
  const pageWrap = document.getElementById('pageWrap');
  const blackout = document.getElementById('blackout');

  startBtn.disabled = true;

  // Step 1: lid opens (tilts back and up)
  lidGroup.style.transform = 'translate(6px, -34px) rotate(-18deg)';

  // Step 2: after the lid finishes opening, zoom into the box
  setTimeout(() => {
    pageWrap.classList.add('zooming');
  }, 650);

  // Step 3: fade to black as the zoom completes
  setTimeout(() => {
    blackout.classList.add('active');
  }, 1400);

  // Step 4: proceed to the rules screen after the blackout completes
  setTimeout(() => {
    window.location.href = 'rules.html';
  }, 2300);
});
</script>

</body>
</html>
