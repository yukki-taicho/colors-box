<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #16161a;
    --line: #e0e0e4;
    --text-primary: #e8e6e0;
    --text-muted: #55545e;
    --mono: 'JetBrains Mono', monospace;
    --jp: 'Zen Kaku Gothic New', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  body {
    font-family: var(--jp);
    background: var(--bg);
    color: var(--text-primary);
    position: relative;
  }
  #roomBg {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 70%;
    width: 100%;
    z-index: -1;
  }
  #resetBtn {
    position: absolute;
    top: 12px; right: 12px;
    z-index: 20;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(16,16,19,0.7);
    border: 1px solid var(--line);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
  }
  #resetBtn:hover { background: rgba(38,38,46,0.9); color: var(--text-primary); }
  #eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  #stage {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 70%;
    width: 100%;
  }
  .box-cell {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    transform: translate(-50%, -100%);
    transition: filter 0.2s ease;
  }
  .box-cell:hover {
    filter: brightness(1.25);
  }
  .box-cell svg {
    width: 100%;
    height: auto;
    display: block;
  }
  #progressArea {
    position: absolute;
    top: 70%; left: 0; right: 0; bottom: 0;
    background: #1c1c22;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 20px;
  }
  #itemLabel {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  #itemSlots {
    display: flex;
    flex-direction: row;
    gap: 12px;
    width: 100%;
    max-width: 340px;
  }
  .item-slot {
    flex: 1;
    aspect-ratio: 1;
    max-width: 56px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .item-slot.filled {
    background: #101013;
    border: 1px solid var(--line);
  }
  .item-slot img, .item-slot svg {
    width: 70%;
    height: 70%;
  }
</style>
</head>
<body>

<button id="resetBtn">RESET</button>

<svg id="roomBg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c22"/>
      <stop offset="100%" stop-color="#101013"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a20"/>
      <stop offset="100%" stop-color="#16161a"/>
    </linearGradient>
    <linearGradient id="ceilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121216"/>
      <stop offset="100%" stop-color="#18181e"/>
    </linearGradient>
  </defs>

  <!-- vanishing point at (400, 260) -->
  <!-- back wall -->
  <polygon points="230,260 570,260 570,490 230,490" fill="url(#wallGrad)"/>
  <!-- ceiling -->
  <polygon points="0,0 800,0 570,260 230,260" fill="url(#ceilGrad)"/>
  <!-- floor -->
  <polygon points="0,800 800,800 570,490 230,490" fill="url(#floorGrad)"/>
  <!-- left wall -->
  <polygon points="0,0 230,260 230,490 0,800" fill="#14141a"/>
  <!-- right wall -->
  <polygon points="800,0 570,260 570,490 800,800" fill="#14141a"/>

  <!-- corner edge lines for depth cue -->
  <g stroke="#2c2c34" stroke-width="1.5" opacity="0.7">
    <line x1="230" y1="260" x2="0" y2="0"/>
    <line x1="570" y1="260" x2="800" y2="0"/>
    <line x1="230" y1="490" x2="0" y2="800"/>
    <line x1="570" y1="490" x2="800" y2="800"/>
    <line x1="230" y1="260" x2="230" y2="490"/>
    <line x1="570" y1="260" x2="570" y2="490"/>
  </g>
</svg>

<div id="stage">
  <button class="box-cell" data-key="ACACIA" data-color="#ACAC1A" style="left:36%; top:71%; width:25%;">
    <svg class="box-svg" viewBox="0 0 240 200" fill="none"></svg>
  </button>

  <button class="box-cell" data-key="CICADA" data-color="#C1CADA" style="left:60%; top:71%; width:25%;">
    <svg class="box-svg" viewBox="0 0 240 200" fill="none"></svg>
  </button>

  <button class="box-cell" data-key="DECADE" data-color="#DECADE" style="left:20%; top:88%; width:34%;">
    <svg class="box-svg" viewBox="0 0 240 200" fill="none"></svg>
  </button>

  <button class="box-cell" data-key="COFFEE" data-color="#C0FFEE" style="left:76%; top:88%; width:34%;">
    <svg class="box-svg" viewBox="0 0 240 200" fill="none"></svg>
  </button>
</div>

<div id="progressArea">
  <div id="itemLabel">ITEM</div>
  <div id="itemSlots">
    <div class="item-slot" data-slot="0"></div>
    <div class="item-slot" data-slot="1"></div>
    <div class="item-slot" data-slot="2"></div>
    <div class="item-slot" data-slot="3"></div>
    <div class="item-slot" data-slot="4"></div>
  </div>
</div>

<script>
// ---- Item definitions per box (each box can grant multiple items) ----
const boxItems = {
  ACACIA: [], // no item for ACACIA
  CICADA: [{ id: 'brush', imgSrc: 'brush.png', label: '筆' }],
  DECADE: [
    { id: 'circle-panel', imgSrc: 'circle-panel.png', label: '丸のパネル' },
    { id: 'triangle-panel', imgSrc: 'triangle-panel.png', label: '三角のパネル' },
    { id: 'square-panel', imgSrc: 'square-panel.png', label: '四角のパネル' }
  ],
  COFFEE: [{ id: 'redink', imgSrc: 'redink.png', label: '赤い絵の具' }]
};

// The starting items the player already holds when they first reach the room
// (granted once, from rules.html's PROCEED button via localStorage).
const STARTING_ITEMS = [
  { id: 'two-panel', imgSrc: 'two-panel.jpeg', label: '「2」のパネル' },
  { id: 'two-panel', imgSrc: 'two-panel.jpeg', label: '「2」のパネル' }
];

// ---- Box SVG rendering (closed vs. open state) ----
function closedBoxSVG(color) {
  return `
    <g transform="translate(18, 0)">
      <polygon points="30,90 130,90 130,170 30,170" fill="${color}" fill-opacity="0.9" stroke="${color}" stroke-width="5" stroke-linejoin="round"/>
      <polygon points="130,90 165,70 165,150 130,170" fill="${color}" fill-opacity="0.7" stroke="${color}" stroke-width="5" stroke-linejoin="round"/>
      <polygon points="30,90 65,70 165,70 130,90" fill="${color}" fill-opacity="0.55" stroke="${color}" stroke-width="5" stroke-linejoin="round"/>
      <polygon points="22,88 62,64 168,64 132,88" fill="${color}" fill-opacity="0.95" stroke="${color}" stroke-width="5" stroke-linejoin="round"/>
      <polygon points="22,88 132,88 132,96 22,96" fill="${color}" fill-opacity="0.75" stroke="${color}" stroke-width="5" stroke-linejoin="round"/>
    </g>`;
}

function openBoxSVG(color) {
  return `
    <g transform="translate(18, 0)">
      <polygon points="30,90 130,90 130,170 30,170" fill="${color}" fill-opacity="0.9" stroke="${color}" stroke-width="5" stroke-linejoin="round"/>
      <polygon points="130,90 165,70 165,150 130,170" fill="${color}" fill-opacity="0.7" stroke="${color}" stroke-width="5" stroke-linejoin="round"/>
      <polygon points="30,90 65,70 165,70 130,90" fill="#000000" fill-opacity="0.55" stroke="${color}" stroke-width="5" stroke-linejoin="round"/>
    </g>`;
}

// ---- Persistence helpers ----
function isUnlocked(key) {
  return localStorage.getItem('unlocked_' + key) === 'true';
}
function isItemTaken(key) {
  return localStorage.getItem('item_taken_' + key) === 'true';
}
function markItemTaken(key) {
  localStorage.setItem('item_taken_' + key, 'true');
}

// The player's current inventory is stored as a JSON array of item objects.
function getInventory() {
  try {
    const raw = localStorage.getItem('inventory');
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}
function saveInventory(items) {
  localStorage.setItem('inventory', JSON.stringify(items));
}

// Grant the starting items exactly once (first time the room is ever reached).
function ensureStartingItems() {
  if (localStorage.getItem('starting_items_granted') === 'true') return;
  const inv = getInventory();
  STARTING_ITEMS.forEach(item => inv.push(item));
  saveInventory(inv);
  localStorage.setItem('starting_items_granted', 'true');
}

// ---- Render all boxes according to their current state ----
function renderBoxes() {
  document.querySelectorAll('.box-cell').forEach(btn => {
    const key = btn.dataset.key;
    const color = btn.dataset.color;
    const svg = btn.querySelector('.box-svg');
    const unlocked = isUnlocked(key);
    svg.innerHTML = unlocked ? openBoxSVG(color) : closedBoxSVG(color);
  });
}

document.querySelectorAll('.box-cell').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.key;

    if (!isUnlocked(key)) {
      // Not solved yet: go to its puzzle page
      window.location.href = 'puzzle-' + key.toLowerCase() + '.html';
      return;
    }

    // Already unlocked (box is open): tapping it collects all items for this box, once
    const items = boxItems[key] || [];
    if (items.length && !isItemTaken(key)) {
      const inv = getInventory();
      items.forEach(item => {
        if (inv.length >= 5) {
          console.warn('Inventory is full (max 5); could not add', item.label);
          return;
        }
        inv.push(item);
      });
      saveInventory(inv);
      markItemTaken(key);
      renderItemSlots();
    }
  });
});

// ---- Item slot rendering: reflects the saved inventory, left to right ----
function renderItemSlots() {
  const slots = Array.from(document.querySelectorAll('.item-slot'));
  const inv = getInventory();
  slots.forEach((slot, i) => {
    const item = inv[i];
    if (item) {
      slot.classList.add('filled');
      slot.innerHTML = `<img src="${item.imgSrc}" alt="${item.label}" />`;
    } else {
      slot.classList.remove('filled');
      slot.innerHTML = '';
    }
  });
}

ensureStartingItems();
renderBoxes();
renderItemSlots();

// Reset everything back to the initial state (dev/testing convenience)
document.getElementById('resetBtn').addEventListener('click', () => {
  localStorage.clear();
  location.reload();
});
</script>

</body>
</html>
