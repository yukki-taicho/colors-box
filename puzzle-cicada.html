<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CICADA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #16161a;
    --panel: #1d1d22;
    --panel-border: #2c2c33;
    --line: #e0e0e4;
    --text-primary: #e8e6e0;
    --text-secondary: #4a4a30;
    --text-muted: #55545e;
    --text-danger: #7a2e1f;
    --text-success: #141403;
    --radius: 10px;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
    --jp: 'Zen Kaku Gothic New', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: var(--display);
    background: #51545b;
    color: var(--text-primary);
    position: relative;
  }

  /* ---- Top half: puzzle image ---- */
  #puzzleArea {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 52%;
    background: #51545b;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }
  #puzzleArea img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
  }
  #backBtn {
    position: absolute;
    top: 16px; left: 16px;
    width: 40px; height: 40px;
    border-radius: 10px;
    background: rgba(37,37,5,0.75);
    border: 1px solid var(--panel-border);
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    z-index: 10;
  }
  #backBtn:hover { background: rgba(58,58,8,0.9); }

  /* ---- Bottom half: password panel ---- */
  #passwordArea {
    position: absolute;
    top: 52%; left: 0; right: 0; bottom: 0;
    background: #51545b;
    background-image: none;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 8px 16px;
  }
  #panel {
    width: 100%;
    max-width: 420px;
    border: 1px solid #9aa1ae;
    border-radius: 16px;
    padding: 1.25rem 1.1rem;
    background: #C1CADA;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
  }
  #eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(20,20,3,0.55);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  #glyphDisplay { width: 100%; height: auto; margin-bottom: 16px; display: block; }
  #inputArea { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type="text"] {
    flex: 1; padding: 12px 14px; border-radius: var(--radius);
    border: 1px solid rgba(20,20,3,0.35); font-size: 15px;
    background: rgba(20,20,3,0.18); color: #141403;
    letter-spacing: 2px;
    font-family: var(--mono);
    text-transform: uppercase;
    outline: none;
  }
  input[type="text"]::placeholder { color: rgba(20,20,3,0.45); }
  button.enterBtn {
    padding: 12px 20px; border-radius: var(--radius);
    border: 1px solid rgba(20,20,3,0.35); background: rgba(20,20,3,0.18);
    font-size: 13px; cursor: pointer; color: #141403;
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }
  button.enterBtn:hover { background: rgba(20,20,3,0.28); }
  #feedback {
    min-height: 18px; font-size: 13px;
    font-family: var(--jp);
    line-height: 1.5;
    color: #141403;
    border-radius: 6px;
    display: inline-block;
    transition: background 0.2s ease, padding 0.2s ease;
  }

  /* ---- Item drawer (independent of the password panel, anchored to viewport bottom) ---- */
  #itemDrawer {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: #6a6f77;
    border-top: 1px solid var(--panel-border);
    transform: translateY(calc(100% - 62px));
    transition: transform 0.3s ease;
    padding: 18px 20px 22px;
    z-index: 50;
  }
  #itemDrawer.open {
    transform: translateY(0);
  }
  #itemTab {
    position: absolute;
    top: -28px; left: 50%;
    transform: translateX(-50%);
    width: 56px; height: 28px;
    background: #6a6f77;
    border: 1px solid var(--panel-border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12px;
  }
  #itemDrawerLabel {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  #itemSlots {
    display: flex;
    gap: 12px;
    max-width: 340px;
  }
  .item-slot {
    flex: 1;
    aspect-ratio: 1;
    max-width: 56px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .item-slot.filled {
    background: #3d4045;
    border: 1px solid var(--line);
  }
  .item-slot img { width: 70%; height: 70%; object-fit: contain; }
  .item-slot.filled { cursor: pointer; }

  /* ---- Item detail modal (tap an item to enlarge and transform it) ---- */
  #itemModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  #itemModal.open { display: flex; }
  #itemModalCard {
    background: #1d1d22;
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    max-width: 300px;
    width: 90%;
  }
  #itemModalPreview {
    width: 140px; height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #itemModalPreview img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    transition: transform 0.2s ease;
  }
  #itemModalControls {
    display: flex;
    gap: 10px;
  }
  #itemModalControls button {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #26262e;
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
  }
  #itemModalControls button:hover { background: #2f2f39; }
  #itemModalClose {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
  }

  /* ---- Drop target on the puzzle image ---- */
  .drop-target {
    position: absolute;
    border: 2px dashed rgba(232,230,224,0.5);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .drop-target.filled {
    border-style: solid;
    border-color: rgba(232,230,224,0.9);
  }
  .drop-target img {
    width: 90%; height: 90%;
    object-fit: contain;
  }
  .drop-target.drag-over {
    background: rgba(232,230,224,0.15);
  }
  .drop-target.armed {
    border-color: #B4DDC0;
    animation: pulseArmed 1s ease-in-out infinite;
    cursor: pointer;
  }
  @keyframes pulseArmed {
    0%, 100% { background: rgba(180,221,192,0.08); }
    50% { background: rgba(180,221,192,0.25); }
  }
</style>
</head>
<body>

<div id="puzzleArea">
  <button id="backBtn">
    <svg viewBox="0 0 40 40" width="20" height="20" fill="none">
      <path d="M 30 26 C 30 18 24 13 16 13 L 11 13" stroke="#e8e6e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 17 7 L 10 13 L 17 19" stroke="#e8e6e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <div id="puzzleImgWrap" style="position: relative; max-width: 100%; max-height: 100%;">
    <img id="puzzleImg" src="puzzle-cicada.png" alt="CICADAの謎" />
    <div class="drop-target" id="dropTarget1" data-accepts="two-panel" style="left:38%; top:62%; width:9%; height:14%;"></div>
  </div>
</div>

<div id="passwordArea">
  <div id="panel">
    <div id="eyebrow">PASSWORD</div>

    <svg id="glyphDisplay" viewBox="0 0 480 90"></svg>

    <div id="inputArea">
      <input id="answerInput" type="text" placeholder="PASSWORD" autocomplete="off" maxlength="6" />
      <button class="enterBtn" id="submitBtn">Enter</button>
    </div>

    <div id="feedback"></div>
  </div>
</div>

<div id="itemDrawer">
  <div id="itemTab">^</div>
  <div id="itemDrawerLabel">ITEM</div>
  <div id="itemSlots">
    <div class="item-slot" data-slot="0"></div>
    <div class="item-slot" data-slot="1"></div>
    <div class="item-slot" data-slot="2"></div>
    <div class="item-slot" data-slot="3"></div>
    <div class="item-slot" data-slot="4"></div>
  </div>
</div>

<div id="itemModal">
  <div id="itemModalCard">
    <div id="itemModalPreview"><img id="itemModalImg" src="" alt="" /></div>
    <div id="itemModalControls">
      <button id="flipHBtn">左右反転</button>
      <button id="flipVBtn">上下反転</button>
      <button id="rotateBtn">90°回転</button>
    </div>
    <button id="placeBtn" style="width:100%; padding:10px; border-radius:8px; background:#26262e; border:1px solid var(--line); color: var(--text-primary); font-family: var(--jp); font-size: 13px; cursor: pointer;">この向きで配置する</button>
    <button id="itemModalClose">閉じる</button>
  </div>
</div>

<script>
const ANSWER = 'CICADA';
let puzzleConditionMet = false;

const strokeW = 7;
function line(x1,y1,x2,y2) { return { x1, y1, x2, y2 }; }

const glyphs = {};
glyphs['1'] = [ line(30,10, 30,80) ];
glyphs['2'] = [ line(10,10,45,10), line(45,10,45,45), line(10,45,45,45), line(10,45,10,80), line(10,80,45,80) ];
glyphs['3'] = [ line(10,10,45,10), line(45,10,45,45), line(10,45,45,45), line(45,45,45,80), line(10,80,45,80) ];
glyphs['4'] = [ line(10,10,10,45), line(10,45,45,45), line(45,10,45,80) ];
glyphs['5'] = [ line(45,10,10,10), line(10,10,10,45), line(10,45,45,45), line(45,45,45,80), line(10,80,45,80) ];
glyphs['6'] = [ line(45,10,10,10), line(10,10,10,80), line(10,45,45,45), line(45,45,45,80), line(10,80,45,80) ];
glyphs['7'] = [ line(10,10,45,10), line(45,10,45,80) ];
glyphs['8'] = [ line(10,10,45,10), line(10,10,10,80), line(45,10,45,80), line(10,45,45,45), line(10,80,45,80) ];
glyphs['9'] = [ line(10,10,45,10), line(10,10,10,45), line(45,10,45,80), line(10,45,45,45), line(10,80,45,80) ];
glyphs['0'] = [ line(10,10,45,10), line(10,10,10,80), line(45,10,45,80), line(10,80,45,80) ];
glyphs['A'] = [ line(10,80,10,30), line(10,30,27,10), line(27,10,45,30), line(45,30,45,80), line(10,45,45,45) ];
glyphs['B'] = [ line(10,10,10,80), line(10,10,35,10), line(35,10,35,40), line(10,40,35,40), line(10,80,45,80), line(45,80,45,40), line(35,40,45,40) ];
glyphs['C'] = [ line(45,10,10,10), line(10,10,10,80), line(10,80,45,80) ];
glyphs['D'] = [ line(10,10,40,10), line(40,10,50,20), line(50,20,50,80), line(10,80,50,80), line(10,10,10,80) ];
glyphs['E'] = [ line(45,10,10,10), line(10,10,10,80), line(10,80,45,80), line(10,45,40,45) ];
glyphs['F'] = [ line(45,10,10,10), line(10,10,10,80), line(10,45,40,45) ];
glyphs['G'] = glyphs['6'];
glyphs['H'] = [ line(10,10,10,80), line(45,10,45,80), line(10,45,45,45) ];
glyphs['I'] = [ line(30,10,30,80) ];
glyphs['J'] = [ line(45,10,45,65), line(45,65,25,80), line(25,80,10,65) ];
glyphs['K'] = [ line(10,10,10,80), line(10,45,45,10), line(10,45,45,80) ];
glyphs['L'] = [ line(10,10,10,80), line(10,80,45,80) ];
glyphs['M'] = [ line(10,10,10,80), line(45,10,45,80), line(10,10,45,10), line(27,10,27,55) ];
glyphs['N'] = [ line(10,80,10,10), line(10,10,45,80), line(45,80,45,10) ];
glyphs['O'] = [ line(10,10,45,10), line(10,10,10,80), line(45,10,45,80), line(10,80,45,80) ];
glyphs['P'] = [ line(10,10,10,80), line(10,10,45,10), line(45,10,45,45), line(10,45,45,45) ];
glyphs['Q'] = [ line(10,10,45,10), line(10,10,10,70), line(45,10,45,70), line(10,70,45,70), line(35,60,50,80) ];
glyphs['R'] = [ line(10,10,10,80), line(10,10,45,10), line(45,10,45,45), line(10,45,45,45), line(10,45,45,80) ];
glyphs['S'] = glyphs['5'];
glyphs['T'] = [ line(10,10,45,10), line(27,10,27,80) ];
glyphs['U'] = [ line(10,10,10,80), line(10,80,45,80), line(45,80,45,10) ];
glyphs['V'] = [ line(10,10,27,80), line(45,10,27,80) ];
glyphs['W'] = [ line(10,10,10,80), line(45,10,45,80), line(10,80,45,80), line(27,80,27,35) ];
glyphs['X'] = [ line(10,10,45,80), line(45,10,10,80) ];
glyphs['Y'] = [ line(10,10,27,45), line(45,10,27,45), line(27,45,27,80) ];
glyphs['Z'] = [ line(10,10,45,10), line(45,10,10,80), line(10,80,45,80) ];

const glyphDisplay = document.getElementById('glyphDisplay');
const inputEl = document.getElementById('answerInput');
const submitBtn = document.getElementById('submitBtn');
const feedbackEl = document.getElementById('feedback');

function normalize(str) { return str.trim().toUpperCase(); }

function glyphSVG(ch, offsetX, color) {
  const strokes = glyphs[ch];
  if (!strokes) return "";
  let out = "";
  strokes.forEach(({x1,y1,x2,y2}) => {
    out += `<line x1="${x1+offsetX}" y1="${y1}" x2="${x2+offsetX}" y2="${y2}" stroke="${color}" stroke-width="${strokeW}" stroke-linecap="round"/>`;
  });
  return out;
}

function renderGlyphs(text) {
  const color = "#141403";
  let svgContent = "";
  const slots = 6;
  const gap = 14;
  const digitW = 46;
  const totalW = slots * digitW + (slots - 1) * gap;
  const startX = (480 - totalW) / 2;
  for (let i = 0; i < slots; i++) {
    const ch = text[i] || "";
    const offsetX = startX + i * (digitW + gap);
    svgContent += glyphSVG(ch, offsetX, color);
  }
  glyphDisplay.innerHTML = svgContent;
}

function checkAnswer() {
  const userAnswer = normalize(inputEl.value);
  if (!userAnswer) {
    feedbackEl.textContent = "何か入力してください";
    feedbackEl.style.background = "transparent";
    feedbackEl.style.padding = "0";
    return;
  }
  if (userAnswer === ANSWER && puzzleConditionMet) {
    feedbackEl.textContent = ANSWER + "のボックスが解錠されました。";
    feedbackEl.style.background = "#B4DDC0";
    feedbackEl.style.padding = "8px 10px";
    localStorage.setItem('unlocked_' + ANSWER, 'true');
  } else {
    feedbackEl.textContent = "入力されたパスワードに誤りがあります。";
    feedbackEl.style.background = "#E3B0A6";
    feedbackEl.style.padding = "8px 10px";
  }
}

inputEl.addEventListener('input', () => renderGlyphs(normalize(inputEl.value)));
submitBtn.addEventListener('click', checkAnswer);
inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkAnswer(); });
renderGlyphs("");

// Item drawer toggle
const itemTab = document.getElementById('itemTab');
const itemDrawer = document.getElementById('itemDrawer');
itemTab.addEventListener('click', () => {
  itemDrawer.classList.toggle('open');
  itemTab.textContent = itemDrawer.classList.contains('open') ? 'v' : '^';
});

// Back button: return to the room
document.getElementById('backBtn').addEventListener('click', () => {
  window.location.href = 'room.html';
});

// ---- Inventory (shared with room.html via localStorage) ----
function getInventory() {
  try {
    const raw = localStorage.getItem('inventory');
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}
function saveInventory(items) {
  localStorage.setItem('inventory', JSON.stringify(items));
}

// Render the inventory into the 5 item slots (index-aligned with the array)
function renderItemSlots() {
  const slots = Array.from(document.querySelectorAll('.item-slot'));
  const inv = getInventory();
  slots.forEach((slot, i) => {
    const item = inv[i];
    if (item) {
      slot.classList.add('filled');
      slot.dataset.itemId = item.id;
      slot.dataset.itemIndex = i;
      slot.innerHTML = `<img src="${item.imgSrc}" alt="${item.label}" style="transform: ${transformFor(item)};" />`;
    } else {
      slot.classList.remove('filled');
      slot.removeAttribute('data-item-id');
      slot.removeAttribute('data-item-index');
      slot.innerHTML = '';
    }
  });
}

// Build a CSS transform string from an item's stored flip/rotate state
function transformFor(item) {
  const flipH = item.flipH ? -1 : 1;
  const flipV = item.flipV ? -1 : 1;
  const rot = item.rotate || 0;
  return `scale(${flipH}, ${flipV}) rotate(${rot}deg)`;
}

// ---- Item detail modal: tap an item to enlarge and transform it ----
const itemModal = document.getElementById('itemModal');
const itemModalImg = document.getElementById('itemModalImg');
let modalItemIndex = null;

function openItemModal(index) {
  const inv = getInventory();
  const item = inv[index];
  if (!item) return;
  modalItemIndex = index;
  itemModalImg.src = item.imgSrc;
  itemModalImg.alt = item.label;
  itemModalImg.style.transform = transformFor(item);
  itemModal.classList.add('open');
}

function closeItemModal() {
  itemModal.classList.remove('open');
  modalItemIndex = null;
}

document.getElementById('itemModalClose').addEventListener('click', closeItemModal);
itemModal.addEventListener('click', (e) => {
  if (e.target === itemModal) closeItemModal();
});

document.getElementById('flipHBtn').addEventListener('click', () => {
  if (modalItemIndex === null) return;
  const inv = getInventory();
  inv[modalItemIndex].flipH = !inv[modalItemIndex].flipH;
  saveInventory(inv);
  itemModalImg.style.transform = transformFor(inv[modalItemIndex]);
  renderItemSlots();
});

document.getElementById('flipVBtn').addEventListener('click', () => {
  if (modalItemIndex === null) return;
  const inv = getInventory();
  inv[modalItemIndex].flipV = !inv[modalItemIndex].flipV;
  saveInventory(inv);
  itemModalImg.style.transform = transformFor(inv[modalItemIndex]);
  renderItemSlots();
});

document.getElementById('rotateBtn').addEventListener('click', () => {
  if (modalItemIndex === null) return;
  const inv = getInventory();
  inv[modalItemIndex].rotate = ((inv[modalItemIndex].rotate || 0) + 90) % 360;
  saveInventory(inv);
  itemModalImg.style.transform = transformFor(inv[modalItemIndex]);
  renderItemSlots();
});

// Tap an item slot to open its modal
document.getElementById('itemSlots').addEventListener('click', (e) => {
  const slot = e.target.closest('.item-slot');
  if (!slot || !slot.classList.contains('filled')) return;
  openItemModal(Number(slot.dataset.itemIndex));
});

// ---- Tap-to-place: works on both mouse and touch ----
// Selecting an item (via its modal) arms it; tapping a drop target places it there.
let armedItemIndex = null;

function armItem(index) {
  armedItemIndex = index;
  document.querySelectorAll('.drop-target').forEach(t => t.classList.add('armed'));
  closeItemModal();
}

document.getElementById('placeBtn').addEventListener('click', () => {
  if (modalItemIndex === null) return;
  armItem(modalItemIndex);
});

document.querySelectorAll('.drop-target').forEach(target => {
  target.addEventListener('click', () => {
    if (armedItemIndex === null) return;

    const inv = getInventory();
    const item = inv[armedItemIndex];
    if (!item) { armedItemIndex = null; return; }

    // Place the item visually in the drop target
    target.classList.add('filled');
    target.innerHTML = `<img src="${item.imgSrc}" alt="${item.label}" style="transform: ${transformFor(item)};" />`;
    target.dataset.placedItemId = item.id;
    target.dataset.placedFlipH = item.flipH ? '1' : '0';
    target.dataset.placedFlipV = item.flipV ? '1' : '0';
    target.dataset.placedRotate = item.rotate || 0;

    // Remove the item from the inventory (it's "in use" on the puzzle now)
    inv.splice(armedItemIndex, 1);
    saveInventory(inv);
    renderItemSlots();

    armedItemIndex = null;
    document.querySelectorAll('.drop-target').forEach(t => t.classList.remove('armed'));
    checkPuzzleSolved();
  });
});

// ---- Puzzle-specific solved condition ----
// CICADA: the "two-panel" item must be placed in dropTarget1, flipped horizontally
// (so the "2" reads as a "5"), to make "祝い＋5＝イワシ" hold.
function checkPuzzleSolved() {
  const target = document.getElementById('dropTarget1');
  const correct =
    target.dataset.placedItemId === 'two-panel' &&
    target.dataset.placedFlipH === '1';
  if (correct) {
    puzzleConditionMet = true;
  }
}

renderItemSlots();
</script>

</body>
</html>
